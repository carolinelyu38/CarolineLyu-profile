document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"),\n  nav: document.getElementById(\"nav\"),\n  panel: document.getElementById(\"panel\"),\n  panelInner: document.getElementById(\"panelInner\"),\n  closePanel: document.getElementById(\"closePanel\"),\n  tooltip: document.getElementById(\"tooltip\"),\n  toast: document.getElementById(\"toast\"),\n  progress: document.getElementById(\"progress\"),\n  bubble: document.getElementById(\"bubble\"),\n};\nconst discovered = new Set(JSON.parse(localStorage.getItem(\"cu-discovered\") || \"[]\"));\nconst totalPlanets = DATA.galaxies.reduce((a, g) => a + g.planets.length, 0);\nfunction updateProgress() {\n  ui.progress.textContent = `✦ ${discovered.size} / ${totalPlanets} worlds discovered`;\n}\nupdateProgress();\ndocument.querySelector(\"#brand .s\").textContent = DATA.owner.name;\nlet toastTimer;\nfunction toast(msg) {\n  ui.toast.textContent = msg;\n  ui.toast.classList.add(\"show\");\n  clearTimeout(toastTimer);\n  toastTimer = setTimeout(() => ui.toast.classList.remove(\"show\"), 2600);\n}\nfunction setHint(msg) { ui.hint.innerHTML = msg; }\nfunction setNavActive() {\n  document.querySelectorAll(\"#nav button\").forEach((b) => b.classList.remove(\"active\"));\n  if (view.mode === \"universe\") document.getElementById(\"navU\").classList.add(\"active\");\n  if (view.mode === \"galaxy\" || view.mode === \"planet\") document.getElementById(view.gi === 0 ? \"navP\" : \"navD\").classList.add(\"active\");\n}\n\n/* ---------- navigation actions ---------- */\nfunction planetWorldPos(pg, gi) {\n  return pg.getWorldPosition(new THREE.Vector3());\n}\nfunction goUniverse(dur = 2.2) {\n  closePanel();\n  view.mode = \"universe\";\n  tweenView({ center: UNIVERSE.center, radius: UNIVERSE.radius, theta: UNIVERSE.theta, phi: UNIVERSE.phi }, dur, 60);\n  setHint(\"Two galaxies drift before you — <b>click one to enter<\u002Fb>, or drag to look around\");\n  setNavActive();\n  renderPlanetList();\n}\nfunction goGalaxy(gi, dur = 2.6) {\n  closePanel();\n  const wasUniverse = view.mode === \"universe\" || view.mode === \"intro\";\n  view.mode = \"galaxy\"; view.gi = gi;\n  const g = galaxies[gi];\n  const c = V3(...g.def.center);\n  tweenView({ center: c, radius: 300, theta: gi === 0 ? -0.5 : 0.5, phi: 1.15 }, dur, wasUniverse ? 0 : 170);\n  setHint(`<b>${g.def.name}<\u002Fb> — ${g.def.tagline}. &nbsp;Click a planet — or use the <b>planet list on the left<\u002Fb> · drag to orbit · scroll to zoom`);\n  setNavActive();\n  renderPlanetList();\n}\nfunction goPlanet(pg, gi, dur = 2.0) {\n  view.mode = \"planet\"; view.gi = gi; view.planet = pg;\n  const p = pg.userData.def;\n  setActivity(p);\n  const wp = planetWorldPos(pg);\n  const offDir = wp.clone().sub(V3(...galaxies[gi].def.center)).normalize();\n  const theta = Math.atan2(offDir.x, offDir.z);\n  tweenView({ center: wp, radius: p.size * 5.2, theta: theta + 0.5, phi: 1.32, lookOffset: V3(0, 0, 0) }, dur, 0, () => {\n    openPanel(p, galaxies[gi].def);\n  });\n  setHint(\"Press <b>Esc<\u002Fb> or “Return to orbit” to leave this world\");\n  renderPlanetList();\n  if (!discovered.has(p.id)) {\n    discovered.add(p.id);\n    localStorage.setItem(\"cu-discovered\", JSON.stringify([...discovered]));\n    updateProgress();\n    toast(`✦ Discovered: ${p.name}`);\n  }\n}\nfunction openPanel(p, g) {\n  ui.panelInner.innerHTML = `\n    <div class=\"p-kicker\" style=\"color:${p.glow}\">${g.name} · ${p.env}<\u002Fdiv>\n    <h2 style=\"text-shadow:0 0 30px ${p.glow}66\">${p.name}<\u002Fh2>\n    <div class=\"p-role\">${p.role}<\u002Fdiv>\n    <div class=\"p-org\">${p.org} &nbsp;·&nbsp; ${p.period}<\u002Fdiv>\n    ${p.actCaption ? `<div class=\"p-act\" style=\"color:${p.glow}\">✦ ${p.actCaption}<\u002Fdiv>` : \"\"}\n    <ul>${p.bullets.map((b) => `<li>${b}<\u002Fli>`).join(\"\")}<\u002Ful>\n    <div class=\"chips\">${p.chips.map((c) => `<span class=\"chip\" style=\"border-color:${p.color}55;color:${p.glow}\">${c}<\u002Fspan>`).join(\"\")}<\u002Fdiv>`;\n  ui.panel.classList.add(\"show\");\n  ui.panel.style.setProperty(\"--accent\", p.color);\n}\nfunction closePanel() {\n  ui.panel.classList.remove(\"show\");\n  if (view.mode === \"planet\") view.planet = null;\n}\nui.closePanel.addEventListener(\"click\", () => goGalaxy(view.gi, 1.6));\naddEventListener(\"keydown\", (e) => {\n  if (e.key === \"Escape\" && view.mode === \"planet\") goGalaxy(view.gi, 1.6);\n});\ndocument.getElementById(\"navU\").addEventListener(\"click\", () => view.mode !== \"universe\" && goUniverse());\ndocument.getElementById(\"navP\").addEventListener(\"click\", () => goGalaxy(0));\ndocument.getElementById(\"navD\").addEventListener(\"click\", () => goGalaxy(1));\n\n/* ---------- planet entry list ---------- */\nconst plEl = document.getElementById(\"planetList\");\nfunction renderPlanetList() {\n  if (view.mode !== \"galaxy\" && view.mode !== \"planet\") { plEl.innerHTML = \"\"; return; }\n  const g = galaxies[view.gi];\n  plEl.innerHTML = `<div class=\"pl-title\">${g.def.name}<\u002Fdiv>` + g.def.planets.map((p, i) =>\n    `<button class=\"pl-btn${view.planet && view.planet.userData.def.id === p.id ? \" on\" : \"\"}\" data-pi=\"${i}\">` +\n    `<span class=\"pl-dot\" style=\"background:${p.color};box-shadow:0 0 10px ${p.glow}\"><\u002Fspan>${p.name}<\u002Fbutton>`).join(\"\");\n  plEl.querySelectorAll(\".pl-btn\").forEach((b) => b.addEventListener(\"click\", () => {\n    const pg = galaxies[view.gi].planets[+b.dataset.pi];\n    burst(pg.getWorldPosition(new THREE.Vector3()), pg.userData.def.glow);\n    goPlanet(pg, view.gi);\n  }));\n}\n\n/* ---------- ambient music (generative WebAudio) ---------- */\nlet audioCtx = null, musicOn = true, masterGain = null;\nconst soundBtn = document.getElementById(\"soundBtn\");\nfunction startMusic() {\n  if (audioCtx) return;\n  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }\n  masterGain = audioCtx.createGain(); masterGain.gain.value = 0;\n  const lp = audioCtx.createBiquadFilter(); lp.type = \"lowpass\"; lp.frequency.value = 1300;\n  const delay = audioCtx.createDelay(2); delay.delayTime.value = 0.62;\n  const fb = audioCtx.createGain(); fb.gain.value = 0.42;\n  const wet = audioCtx.createGain(); wet.gain.value = 0.5;\n  delay.connect(fb); fb.connect(delay);\n  masterGain.connect(lp); lp.connect(audioCtx.destination);\n  lp.connect(delay); delay.connect(wet); wet.connect(audioCtx.destination);\n  masterGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 5);\n  const chords = [\n    [130.81, 196.0, 246.94, 329.63], [146.83, 220.0, 277.18, 349.23],\n    [123.47, 185.0, 233.08, 311.13], [110.0, 164.81, 207.65, 277.18],\n  ];\n  let ci = 0;\n  (function playChord() {\n    if (!audioCtx) return;\n    const t = audioCtx.currentTime;\n    chords[ci % chords.length].forEach((f, i) => {\n      const o = audioCtx.createOscillator(); o.type = i % 2 ? \"sine\" : \"triangle\";\n      o.frequency.value = f * (1 + (Math.random() - 0.5) * 0.002);\n      const g = audioCtx.createGain();\n      g.gain.setValueAtTime(0, t);\n      g.gain.linearRampToValueAtTime(0.05 + 0.02 * Math.random(), t + 3.5);\n      g.gain.linearRampToValueAtTime(0, t + 11);\n      o.connect(g); g.connect(masterGain);\n      o.start(t); o.stop(t + 11.5);\n    });\n    ci++;\n    setTimeout(playChord, 8000);\n  })();\n  (function sparkle() {\n    if (!audioCtx) return;\n    const t = audioCtx.currentTime;\n    const o = audioCtx.createOscillator(); o.type = \"sine\";\n    o.frequency.value = [1046.5, 1318.5, 1568.0, 1975.5, 2349.3][Math.floor(Math.random() * 5)];\n    const g = audioCtx.createGain();\n    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.04, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + 2.4);\n    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 2.5);\n    setTimeout(sparkle, 2500 + Math.random() * 5500);\n  })();\n}\nfunction setMusic(on) {\n  musicOn = on;\n  soundBtn.textContent = on ? \"♫ music on\" : \"♫ muted\";\n  soundBtn.classList.toggle(\"off\", !on);\n  if (masterGain && audioCtx) masterGain.gain.linearRampToValueAtTime(on ? 0.15 : 0, audioCtx.currentTime + 0.8);\n}\nsoundBtn.addEventListener(\"click\", () => { startMusic(); setMusic(!musicOn); });\n\nui.enter.addEventListener(\"click\", () => {\n  startMusic();\n  ui.intro.classList.add(\"hide\");\n  ui.hud.classList.add(\"show\");\n  setTimeout(() => ui.intro.remove(), 1400);\n  goUniverse(3.4);\n});\n\n/* ---------- pointer: orbit, hover, click ---------- */\nconst ray = new THREE.Raycaster();\nconst mouseNDC = new THREE.Vector2(-2, -2);\nlet dragging = false, dragMoved = 0, lastX = 0, lastY = 0;\nconst px = { x: 0.5, y: 0.5 };\nrenderer.domElement.addEventListener(\"pointerdown\", (e) => { dragging = true; dragMoved = 0; lastX = e.clientX; lastY = e.clientY; });\naddEventListener(\"pointerup\", () => { dragging = false; });\naddEventListener(\"pointermove\", (e) => {\n  px.x = e.clientX / innerWidth; px.y = e.clientY / innerHeight;\n  mouseNDC.set(px.x * 2 - 1, -(px.y * 2 - 1));\n  ui.tooltip.style.left = e.clientX + 14 + \"px\";\n  ui.tooltip.style.top = e.clientY + 10 + \"px\";\n  if (dragging && !view.transitioning && (view.mode === \"galaxy\" || view.mode === \"universe\")) {\n    const dx = e.clientX - lastX, dy = e.clientY - lastY;\n    dragMoved += Math.abs(dx) + Math.abs(dy);\n    view.theta -= dx * 0.0042;\n    view.phi = clamp(view.phi - dy * 0.0032, 0.55, 1.65);\n    lastX = e.clientX; lastY = e.clientY;\n  }\n});\nrenderer.domElement.addEventListener(\"wheel\", (e) => {\n  if (view.transitioning || view.mode === \"intro\" || view.mode === \"planet\") return;\n  const min = view.mode === \"universe\" ? 420 : 120;\n  const max = view.mode === \"universe\" ? 1100 : 520;\n  view.radius = clamp(view.radius * (1 + e.deltaY * 0.001), min, max);\n}, { passive: true });\n\nlet hovered = null;\nfunction pick() {\n  if (view.mode === \"intro\" || view.transitioning) { ui.tooltip.classList.remove(\"show\"); hovered = null; return; }\n  ray.setFromCamera(mouseNDC, camera);\n  const hits = ray.intersectObjects(clickables, false);\n  const valid = hits.find((h) => !(h.object.userData.galaxyHit !== undefined && view.mode !== \"universe\"));\n  const hit = valid?.object || null;\n  if (hit !== hovered) {\n    if (hovered?.userData.planet) {\n      const pg = hovered.parent; tween(0.3, (e) => pg.userData.atmo.scale.setScalar(lerp(pg.userData.atmo.scale.x, 1, e)), null, easeO);\n    }\n    hovered = hit;\n    if (hovered?.userData.planet && view.mode !== \"planet\") {\n      const pg = hovered.parent;\n      tween(0.3, (e) => pg.userData.atmo.scale.setScalar(lerp(1, 1.16, e)), null, easeO);\n      ui.tooltip.textContent = hovered.userData.planet.name + \" — \" + hovered.userData.planet.role;\n      ui.tooltip.classList.add(\"show\");\n    } else if (hovered?.userData.galaxyHit !== undefined && view.mode === \"universe\") {\n      ui.tooltip.textContent = \"Enter \" + DATA.galaxies[hovered.userData.galaxyHit].name;\n      ui.tooltip.classList.add(\"show\");\n    } else if (hovered?.userData.avatarHit) {\n      ui.tooltip.textContent = \"Say hi to Caroline ✦\";\n      ui.tooltip.classList.add(\"show\");\n    } else {\n      ui.tooltip.classList.remove(\"show\");\n    }\n  }\n  document.body.style.cursor = hovered ? \"pointer\" : \"default\";\n}\nrenderer.domElement.addEventListener(\"click\", () => {\n  if (dragMoved > 6 || view.transitioning || view.mode === \"intro\" || !hovered) return;\n  const ud = hovered.userData;\n  if (ud.avatarHit) {\n    burst(avatar.position.clone(), \"#ffd9a8\");\n    avatarSpin += Math.PI * 4;\n    showBubble();\n    return;\n  }\n  if (view.mode === \"universe\" && (ud.galaxyHit !== undefined || ud.planet)) {\n    goGalaxy(ud.galaxyHit !== undefined ? ud.galaxyHit : ud.gi);\n    return;\n  }\n  if (ud.planet && view.mode !== \"planet\") {\n    burst(hovered.getWorldPosition(new THREE.Vector3()), ud.planet.glow);\n    goPlanet(hovered.parent, ud.gi);\n  } else if (ud.galaxyHit !== undefined && ud.galaxyHit !== view.gi) {\n    goGalaxy(ud.galaxyHit);\n  }\n});\nconst bubbleLines = [\n  \"hi! i'm caroline ✦\", \"welcome to my universe!\", \"10M+ views… no big deal ☄\", \"ops × AI × stories\",\n  \"try the Dream Cosmos →\", \"click a planet to land!\",\n];\nlet bubbleTimer;\nfunction showBubble() {\n  ui.bubble.textContent = bubbleLines[Math.floor(Math.random() * bubbleLines.length)];\n  ui.bubble.classList.add(\"show\");\n  clearTimeout(bubbleTimer);\n  bubbleTimer = setTimeout(() => ui.bubble.classList.remove(\"show\"), 2400);\n}\n\n/* ---------- main loop ---------- */\nconst clock = new THREE.Clock();\nlet elapsed = 0;\nfunction animate() {\n  requestAnimationFrame(animate);\n  const dt = Math.min(clock.getDelta(), 0.05);\n  elapsed += dt;\n  const now = performance.now();\n  stepTweens(now);\n  stepBursts(dt);\n\n  starMats.forEach((m) => (m.uniforms.uTime.value = elapsed));\n  haloMat.uniforms.uTime.value = elapsed;\n  nebulaGroup.children.forEach((s) => (s.material.rotation += s.userData.rot * dt));\n\n  galaxies.forEach((g, gi) => {\n    g.group.rotation.y += dt * 0.008;\n    g.group.children.forEach((ch) => { if (ch.material?.uniforms?.uTime) ch.material.uniforms.uTime.value = elapsed; });\n    const inGalaxy = (view.mode === \"galaxy\" || view.mode === \"planet\") && view.gi === gi;\n    g.gLabel.material.opacity = lerp(g.gLabel.material.opacity, view.mode === \"universe\" || view.mode === \"intro\" ? 0.95 : 0, dt * 3);\n    g.planets.forEach((pg) => {\n      const d = pg.userData.def;\n      // freeze orbit while focused on this planet\n      if (!(view.mode === \"planet\" && view.planet === pg)) pg.userData.angle += dt * d.speed;\n      const a = pg.userData.angle;\n      pg.position.set(Math.cos(a) * d.orbitR, Math.sin(a) * d.orbitR * Math.sin(d.tilt) * 0.4, Math.sin(a) * d.orbitR);\n      pg.userData.mesh.rotation.y += dt * 0.25;\n      pg.userData.moons.forEach((m) => {\n        const o = m.userData.orbit;\n        m.position.set(Math.cos(elapsed * o.s + o.p) * o.r, Math.sin(elapsed * o.s * 0.7 + o.p) * o.r * 0.25, Math.sin(elapsed * o.s + o.p) * o.r);\n      });\n      pg.userData.label.material.opacity = lerp(pg.userData.label.material.opacity, inGalaxy ? 0.92 : 0, dt * 3);\n      // billboard labels stay under planet (sprites auto-face)\n    });\n  });\n\n  // planet-follow while focused\n  if (view.mode === \"planet\" && view.planet && !view.transitioning) {\n    view.center.copy(planetWorldPos(view.planet));\n  }\n  // gentle idle drift\n  if (!view.transitioning && (view.mode === \"galaxy\" || view.mode === \"universe\")) {\n    view.theta += dt * 0.012;\n  }\n  // subtle mouse parallax via lookOffset\n  if (!view.transitioning) {\n    const k = view.mode === \"planet\" ? 2.2 : 10;\n    view.lookOffset.x = lerp(view.lookOffset.x, (px.x - 0.5) * k, dt * 2);\n    view.lookOffset.y = lerp(view.lookOffset.y, -(px.y - 0.5) * k * 0.6, dt * 2);\n  }\n  applyCamera();\n\n  // avatar placement\n  let target;\n  if (view.mode === \"intro\" || view.mode === \"universe\") {\n    target = V3(0, 10, 80);\n  } else if (view.mode === \"planet\" && view.planet) {\n    const wp = planetWorldPos(view.planet);\n    const d = view.planet.userData.def;\n    // stand beside the planet from the viewer's perspective — always fully visible, never blocking\n    const camDir = camera.position.clone().sub(wp).normalize();\n    const side = new THREE.Vector3().crossVectors(camera.up, camDir).normalize();\n    target = wp.add(side.multiplyScalar(-d.size * 1.75)).add(camDir.multiplyScalar(d.size * 1.1)).add(V3(0, -d.size * 0.05, 0));\n  } else {\n    const c = galaxies[view.gi].def.center;\n    target = V3(c[0], c[1] + 26, c[2] + 58);\n  }\n  avatar.position.lerp(target, dt * 1.8);\n  // stand upright, always facing the camera\n  avatar.rotation.y = Math.atan2(camera.position.x - avatar.position.x, camera.position.z - avatar.position.z);\n  avatarSpin = lerp(avatarSpin, 0, dt * 2.4);\n  const breathe = 1 + Math.sin(elapsed * 1.6) * 0.025;\n  avatarInner.scale.set(1, breathe, 1);\n  rig.visible = view.mode === \"planet\" && !view.transitioning;\n  const pose = view.mode === \"planet\" && view.planet ? avatarPoses[view.planet.userData.def.act] : null;\n  if (pose) {\n    avatarInner.rotation.x = lerp(avatarInner.rotation.x, pose.lean + Math.sin(elapsed * pose.spd) * 0.05, dt * 3);\n    avatarInner.position.y = Math.sin(elapsed * pose.spd * 0.7) * pose.amp;\n    avatarInner.rotation.z = Math.sin(elapsed * 0.9) * pose.wig;\n    avatarInner.rotation.y = Math.sin(elapsed * 0.5) * (pose.scan || 0.12) - avatarSpin;\n  } else {\n    avatarInner.rotation.x = lerp(avatarInner.rotation.x, 0, dt * 3);\n    avatarInner.position.y = Math.sin(elapsed * 1.1) * 1.0;\n    avatarInner.rotation.z = Math.sin(elapsed * 0.8) * 0.05;\n    avatarInner.rotation.y = Math.sin(elapsed * 0.4) * 0.15 - avatarSpin;\n  }\n  if (rig.visible && rigAnim) rigAnim(elapsed);\n  if (accWrap) {\n    accWrap.rotation.y = elapsed * 0.55;\n    accWrap.rotation.z = Math.sin(elapsed * 0.7) * 0.15;\n    accWrap.position.y = 3 + Math.sin(elapsed * 1.15 + 1) * 0.9;\n  }\n  // bubble follows avatar\n  if (ui.bubble.classList.contains(\"show\")) {\n    const sp = avatar.position.clone().add(V3(0, 9, 0)).project(camera);\n    ui.bubble.style.left = (sp.x * 0.5 + 0.5) * innerWidth + \"px\";\n    ui.bubble.style.top = (-sp.y * 0.5 + 0.5) * innerHeight + \"px\";\n  }\n\n  composer.render();\n}\napplyCamera();\nanimate();\n\n/* ---------- admin ---------- */\nconst adminEl = document.getElementById(\"admin\");\nfunction admEsc(v) { return String(v == null ? \"\" : v).replace(/&/g, \"&amp;\").replace(/\"/g, \"&quot;\").replace(/<\u002Fg, \"&lt;\"); }\nfunction admInp(k, label, v) { return `<label class=\"adm-l\">${label}<input data-k=\"${k}\" value=\"${admEsc(v)}\"><\u002Flabel>`; }\nfunction admArea(k, label, v, rows = 4) { return `<label class=\"adm-l wide\">${label}<textarea data-k=\"${k}\" rows=\"${rows}\">${admEsc(v)}<\u002Ftextarea><\u002Flabel>`; }\nfunction renderAdmin() {\n  let html = `<div class=\"adm-card\"><div class=\"adm-title\">Profile<\u002Fdiv>\n    ${admInp(\"owner.name\", \"Name\", DATA.owner.name)}${admInp(\"owner.sub\", \"Subtitle\", DATA.owner.sub)}<\u002Fdiv>`;\n  DATA.galaxies.forEach((g) => g.planets.forEach((p) => {\n    html += `<div class=\"adm-card\"><div class=\"adm-title\" style=\"color:${p.glow}\">${p.name} · ${g.name}<\u002Fdiv>\n      ${admInp(\"p.\" + p.id + \".name\", \"Planet name\", p.name)}\n      ${admInp(\"p.\" + p.id + \".role\", \"Role\", p.role)}\n      ${admInp(\"p.\" + p.id + \".org\", \"Organization\", p.org)}\n      ${admInp(\"p.\" + p.id + \".period\", \"Period\", p.period)}\n      ${admArea(\"p.\" + p.id + \".env\", \"Environment description\", p.env, 2)}\n      ${admArea(\"p.\" + p.id + \".bullets\", \"Experience bullets (one per line)\", p.bullets.join(\"\\n\"))}\n      ${admInp(\"p.\" + p.id + \".chips\", \"Chips (comma separated)\", p.chips.join(\", \"))}\n      ${admInp(\"p.\" + p.id + \".actCaption\", \"Bean activity caption\", p.actCaption || \"\")}\n    <\u002Fdiv>`;\n  }));\n  document.getElementById(\"adminBody\").innerHTML = html;\n}\ndocument.getElementById(\"navA\").addEventListener(\"click\", () => { renderAdmin(); adminEl.classList.add(\"show\"); });\ndocument.getElementById(\"admClose\").addEventListener(\"click\", () => adminEl.classList.remove(\"show\"));\ndocument.getElementById(\"admReset\").addEventListener(\"click\", () => { localStorage.removeItem(\"cu-admin-overrides\"); location.reload(); });\ndocument.getElementById(\"admSave\").addEventListener(\"click\", () => {\n  const ov = { owner: {}, planets: {} };\n  adminEl.querySelectorAll(\"[data-k]\").forEach((el) => {\n    const k = el.dataset.k, v = el.value;\n    if (k.startsWith(\"owner.\")) { ov.owner[k.slice(6)] = v; return; }\n    const parts = k.split(\".\");\n    const id = parts[1], field = parts[2];\n    ov.planets[id] = ov.planets[id] || {};\n    if (field === \"bullets\") ov.planets[id].bullets = v.split(\"\\n\").map((s) => s.trim()).filter(Boolean);\n    else if (field === \"chips\") ov.planets[id].chips = v.split(\",\").map((s) => s.trim()).filter(Boolean);\n    else ov.planets[id][field] = v;\n  });\n  localStorage.setItem(\"cu-admin-overrides\", JSON.stringify(ov));\n  location.reload();\n});\n\naddEventListener(\"resize\", () => {\n  camera.aspect = innerWidth / innerHeight;\n  camera.updateProjectionMatrix();\n  renderer.setSize(innerWidth, innerHeight);\n  composer.setSize(innerWidth, innerHeight);\n});\n\n<\u002Fscript>\n  \n\n\n<\u002Fbody><\u002Fhtml>"
