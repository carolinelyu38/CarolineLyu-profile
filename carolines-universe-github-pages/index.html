/* ---------- particle bursts ---------- */
const bursts = [];
function burst(worldPos, hex) {
  const n = 130;
  const pos = new Float32Array(n * 3), vel = [];
  for (let i = 0; i < n; i++) {
    pos[i * 3] = worldPos.x; pos[i * 3 + 1] = worldPos.y; pos[i * 3 + 2] = worldPos.z;
    const th = Math.random() * 6.28, ph = Math.acos(2 * Math.random() - 1), sp = 14 + Math.random() * 30;
    vel.push(V3(Math.sin(ph) * Math.cos(th) * sp, Math.cos(ph) * sp, Math.sin(ph) * Math.sin(th) * sp));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ size: 3.4, map: starTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, color: hex });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  bursts.push({ pts, vel, life: 1.3, t: 0 });
}
function stepBursts(dt) {
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.t += dt;
    const arr = b.pts.geometry.attributes.position.array;
    for (let j = 0; j < b.vel.length; j++) {
      arr[j * 3] += b.vel[j].x * dt; arr[j * 3 + 1] += b.vel[j].y * dt; arr[j * 3 + 2] += b.vel[j].z * dt;
      b.vel[j].multiplyScalar(1 - dt * 1.8);
    }
    b.pts.geometry.attributes.position.needsUpdate = true;
    b.pts.material.opacity = clamp(1 - b.t / b.life, 0, 1);
    if (b.t > b.life) { scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose(); bursts.splice(i, 1); }
  }
}

function applyCamera() {
  const sp = new THREE.Spherical(view.radius, view.phi, view.theta);
  camera.position.setFromSpherical(sp).add(view.center);
  camera.lookAt(view.center.clone().add(view.lookOffset));

function tweenView(to, dur = 2.4, arc = 0, onDone) {
  view.transitioning = true;
  const from = { c: view.center.clone(), r: view.radius, t: view.theta, p: view.phi, lo: view.lookOffset.clone() };
  const tc = to.center.clone(), tlo = (to.lookOffset || V3(0, 0, 0)).clone();
  // shortest theta path
  let dTheta = (to.theta ?? view.theta) - from.t;
  tween(dur, (e, rawT) => {
    view.center.lerpVectors(from.c, tc, e);
    view.center.y += Math.sin(rawT * Math.PI) * arc;
    view.radius = lerp(from.r, to.radius, e) + Math.sin(rawT * Math.PI) * arc * 1.6;
    view.theta = from.t + dTheta * e;
    view.phi = lerp(from.p, to.phi ?? view.phi, e);
    view.lookOffset.lerpVectors(from.lo, tlo, e);
  }, () => { view.transitioning = false; onDone && onDone(); });
}

/* ---------- ambient music (generative WebAudio) ---------- */
let audioCtx = null, musicOn = true, masterGain = null;
const soundBtn = document.getElementById("soundBtn");
function startMusic() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0;
  const lp = audioCtx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 1300;
  const delay = audioCtx.createDelay(2); delay.delayTime.value = 0.62;
  const fb = audioCtx.createGain(); fb.gain.value = 0.42;
  const wet = audioCtx.createGain(); wet.gain.value = 0.5;
  delay.connect(fb); fb.connect(delay);
  masterGain.connect(lp); lp.connect(audioCtx.destination);
  lp.connect(delay); delay.connect(wet); wet.connect(audioCtx.destination);
  masterGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 5);
  const chords = [
    [130.81, 196.0, 246.94, 329.63], [146.83, 220.0, 277.18, 349.23],
    [123.47, 185.0, 233.08, 311.13], [110.0, 164.81, 207.65, 277.18],
  ];
  let ci = 0;
  (function playChord() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    chords[ci % chords.length].forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type = i % 2 ? "sine" : "triangle";
      o.frequency.value = f * (1 + (Math.random() - 0.5) * 0.002);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.05 + 0.02 * Math.random(), t + 3.5);
      g.gain.linearRampToValueAtTime(0, t + 11);
      o.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t + 11.5);
    });
    ci++;
    setTimeout(playChord, 8000);
  })();
  (function sparkle() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type = "sine";
    o.frequency.value = [1046.5, 1318.5, 1568.0, 1975.5, 2349.3][Math.floor(Math.random() * 5)];
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.04, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + 2.4);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 2.5);
    setTimeout(sparkle, 2500 + Math.random() * 5500);
  })();
}
function setMusic(on) {
  musicOn = on;
  soundBtn.textContent = on ? "♫ music on" : "♫ muted";
  soundBtn.classList.toggle("off", !on);
  if (masterGain && audioCtx) masterGain.gain.linearRampToValueAtTime(on ? 0.15 : 0, audioCtx.currentTime + 0.8);
}
soundBtn.addEventListener("click", () => { startMusic(); setMusic(!musicOn); });

ui.enter.addEventListener("click", () => {
  startMusic();
  ui.intro.classList.add("hide");
  ui.hud.classList.add("show");
  setTimeout(() => ui.intro.remove(), 1400);
  goUniverse(3.4);
});

/* ---------- pointer: orbit, hover, click ---------- */
const ray = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-2, -2);
let dragging = false, dragMoved = 0, lastX = 0, lastY = 0;
const px = { x: 0.5, y: 0.5 };
renderer.domElement.addEventListener("pointerdown", (e) => { dragging = true; dragMoved = 0; lastX = e.clientX; lastY = e.clientY; });
addEventListener("pointerup", () => { dragging = false; });
addEventListener("pointermove", (e) => {
  px.x = e.clientX / innerWidth; px.y = e.clientY / innerHeight;
  mouseNDC.set(px.x * 2 - 1, -(px.y * 2 - 1));
  ui.tooltip.style.left = e.clientX + 14 + "px";
  ui.tooltip.style.top = e.clientY + 10 + "px";
  if (dragging && !view.transitioning && (view.mode === "galaxy" || view.mode === "universe")) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    dragMoved += Math.abs(dx) + Math.abs(dy);
    view.theta -= dx * 0.0042;
    view.phi = clamp(view.phi - dy * 0.0032, 0.55, 1.65);
    lastX = e.clientX; lastY = e.clientY;
  }
});
renderer.domElement.addEventListener("wheel", (e) => {
  if (view.transitioning || view.mode === "intro" || view.mode === "planet") return;
  const min = view.mode === "universe" ? 420 : 120;
  const max = view.mode === "universe" ? 1100 : 520;
  view.radius = clamp(view.radius * (1 + e.deltaY * 0.001), min, max);
}, { passive: true });

let hovered = null;
function pick() {
  if (view.mode === "intro" || view.transitioning) { ui.tooltip.classList.remove("show"); hovered = null; return; }
  ray.setFromCamera(mouseNDC, camera);
  const hits = ray.intersectObjects(clickables, false);
  const valid = hits.find((h) => !(h.object.userData.galaxyHit !== undefined && view.mode !== "universe"));
  const hit = valid?.object || null;
  if (hit !== hovered) {
    if (hovered?.userData.planet) {
      const pg = hovered.parent; tween(0.3, (e) => pg.userData.atmo.scale.setScalar(lerp(pg.userData.atmo.scale.x, 1, e)), null, easeO);
    }
    hovered = hit;
    if (hovered?.userData.planet && view.mode !== "planet") {
      const pg = hovered.parent;
      tween(0.3, (e) => pg.userData.atmo.scale.setScalar(lerp(1, 1.16, e)), null, easeO);
      ui.tooltip.textContent = hovered.userData.planet.name + " — " + hovered.userData.planet.role;
      ui.tooltip.classList.add("show");
    } else if (hovered?.userData.galaxyHit !== undefined && view.mode === "universe") {
      ui.tooltip.textContent = "Enter " + DATA.galaxies[hovered.userData.galaxyHit].name;
      ui.tooltip.classList.add("show");
    } else if (hovered?.userData.avatarHit) {
      ui.tooltip.textContent = "Say hi to Caroline ✦";
      ui.tooltip.classList.add("show");
    } else {
      ui.tooltip.classList.remove("show");
    }
  }
  document.body.style.cursor = hovered ? "pointer" : "default";
}
renderer.domElement.addEventListener("click", () => {
  if (dragMoved > 6 || view.transitioning || view.mode === "intro" || !hovered) return;
  const ud = hovered.userData;
  if (ud.avatarHit) {
    burst(avatar.position.clone(), "#ffd9a8");
    avatarSpin += Math.PI * 4;
    showBubble();
    return;
  }
  if (view.mode === "universe" && (ud.galaxyHit !== undefined || ud.planet)) {
    goGalaxy(ud.galaxyHit !== undefined ? ud.galaxyHit : ud.gi);
    return;
  }
  if (ud.planet && view.mode !== "planet") {
    burst(hovered.getWorldPosition(new THREE.Vector3()), ud.planet.glow);
    goPlanet(hovered.parent, ud.gi);
  } else if (ud.galaxyHit !== undefined && ud.galaxyHit !== view.gi) {
    goGalaxy(ud.galaxyHit);
  }
});
const bubbleLines = [
  "hi! i'm caroline ✦", "welcome to my universe!", "10M+ views… no big deal ☄", "ops × AI × stories",
  "try the Dream Cosmos →", "click a planet to land!",
];
let bubbleTimer;
function showBubble() {
  ui.bubble.textContent = bubbleLines[Math.floor(Math.random() * bubbleLines.length)];
  ui.bubble.classList.add("show");
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => ui.bubble.classList.remove("show"), 2400);
}

/* ---------- main loop ---------- */
const clock = new THREE.Clock();
let elapsed = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;
  const now = performance.now();
  stepTweens(now);
  stepBursts(dt);

  starMats.forEach((m) => (m.uniforms.uTime.value = elapsed));
  haloMat.uniforms.uTime.value = elapsed;
  nebulaGroup.children.forEach((s) => (s.material.rotation += s.userData.rot * dt));

  galaxies.forEach((g, gi) => {
    g.group.rotation.y += dt * 0.008;
    g.group.children.forEach((ch) => { if (ch.material?.uniforms?.uTime) ch.material.uniforms.uTime.value = elapsed; });
    const inGalaxy = (view.mode === "galaxy" || view.mode === "planet") && view.gi === gi;
    g.gLabel.material.opacity = lerp(g.gLabel.material.opacity, view.mode === "universe" || view.mode === "intro" ? 0.95 : 0, dt * 3);
    g.planets.forEach((pg) => {
      const d = pg.userData.def;
      // freeze orbit while focused on this planet
      if (!(view.mode === "planet" && view.planet === pg)) pg.userData.angle += dt * d.speed;
      const a = pg.userData.angle;
      pg.position.set(Math.cos(a) * d.orbitR, Math.sin(a) * d.orbitR * Math.sin(d.tilt) * 0.4, Math.sin(a) * d.orbitR);
      pg.userData.mesh.rotation.y += dt * 0.25;
      pg.userData.moons.forEach((m) => {
        const o = m.userData.orbit;
        m.position.set(Math.cos(elapsed * o.s + o.p) * o.r, Math.sin(elapsed * o.s * 0.7 + o.p) * o.r * 0.25, Math.sin(elapsed * o.s + o.p) * o.r);
      });
      pg.userData.label.material.opacity = lerp(pg.userData.label.material.opacity, inGalaxy ? 0.92 : 0, dt * 3);
      // billboard labels stay under planet (sprites auto-face)
    });
  });

  // planet-follow while focused
  if (view.mode === "planet" && view.planet && !view.transitioning) {
    view.center.copy(planetWorldPos(view.planet));
  }
  // gentle idle drift
  if (!view.transitioning && (view.mode === "galaxy" || view.mode === "universe")) {
    view.theta += dt * 0.012;
  }
  // subtle mouse parallax via lookOffset
  if (!view.transitioning) {
    const k = view.mode === "planet" ? 2.2 : 10;
    view.lookOffset.x = lerp(view.lookOffset.x, (px.x - 0.5) * k, dt * 2);
    view.lookOffset.y = lerp(view.lookOffset.y, -(px.y - 0.5) * k * 0.6, dt * 2);
  }
  applyCamera();

  // avatar placement
  let target;
  if (view.mode === "intro" || view.mode === "universe") {
    target = V3(0, 10, 80);
  } else if (view.mode === "planet" && view.planet) {
    const wp = planetWorldPos(view.planet);
    const d = view.planet.userData.def;
    // stand beside the planet from the viewer's perspective — always fully visible, never blocking
    const camDir = camera.position.clone().sub(wp).normalize();
    const side = new THREE.Vector3().crossVectors(camera.up, camDir).normalize();
    target = wp.add(side.multiplyScalar(-d.size * 1.75)).add(camDir.multiplyScalar(d.size * 1.1)).add(V3(0, -d.size * 0.05, 0));
  } else {
    const c = galaxies[view.gi].def.center;
    target = V3(c[0], c[1] + 26, c[2] + 58);
  }
  avatar.position.lerp(target, dt * 1.8);
  // stand upright, always facing the camera
  avatar.rotation.y = Math.atan2(camera.position.x - avatar.position.x, camera.position.z - avatar.position.z);
  avatarSpin = lerp(avatarSpin, 0, dt * 2.4);
  const breathe = 1 + Math.sin(elapsed * 1.6) * 0.025;
  avatarInner.scale.set(1, breathe, 1);
  rig.visible = view.mode === "planet" && !view.transitioning;
  const pose = view.mode === "planet" && view.planet ? avatarPoses[view.planet.userData.def.act] : null;
  if (pose) {
    avatarInner.rotation.x = lerp(avatarInner.rotation.x, pose.lean + Math.sin(elapsed * pose.spd) * 0.05, dt * 3);
    avatarInner.position.y = Math.sin(elapsed * pose.spd * 0.7) * pose.amp;
    avatarInner.rotation.z = Math.sin(elapsed * 0.9) * pose.wig;
    avatarInner.rotation.y = Math.sin(elapsed * 0.5) * (pose.scan || 0.12) - avatarSpin;
  } else {
    avatarInner.rotation.x = lerp(avatarInner.rotation.x, 0, dt * 3);
    avatarInner.position.y = Math.sin(elapsed * 1.1) * 1.0;
    avatarInner.rotation.z = Math.sin(elapsed * 0.8) * 0.05;
    avatarInner.rotation.y = Math.sin(elapsed * 0.4) * 0.15 - avatarSpin;
  }
  if (rig.visible && rigAnim) rigAnim(elapsed);
  if (accWrap) {
    accWrap.rotation.y = elapsed * 0.55;
    accWrap.rotation.z = Math.sin(elapsed * 0.7) * 0.15;
    accWrap.position.y = 3 + Math.sin(elapsed * 1.15 + 1) * 0.9;
  }
  // bubble follows avatar
  if (ui.bubble.classList.contains("show")) {
    const sp = avatar.position.clone().add(V3(0, 9, 0)).project(camera);
    ui.bubble.style.left = (sp.x * 0.5 + 0.5) * innerWidth + "px";
    ui.bubble.style.top = (-sp.y * 0.5 + 0.5) * innerHeight + "px";
  }

  composer.render();
}
applyCamera();
animate();

/* ---------- admin ---------- */
const adminEl = document.getElementById("admin");
function admEsc(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
function admInp(k, label, v) { return `<label class="adm-l">${label}<input data-k="${k}" value="${admEsc(v)}"></label>`; }
function admArea(k, label, v, rows = 4) { return `<label class="adm-l wide">${label}<textarea data-k="${k}" rows="${rows}">${admEsc(v)}</textarea></label>`; }
function renderAdmin() {
  let html = `<div class="adm-card"><div class="adm-title">Profile</div>
    ${admInp("owner.name", "Name", DATA.owner.name)}${admInp("owner.sub", "Subtitle", DATA.owner.sub)}</div>`;
  DATA.galaxies.forEach((g) => g.planets.forEach((p) => {
    html += `<div class="adm-card"><div class="adm-title" style="color:${p.glow}">${p.name} · ${g.name}</div>
      ${admInp("p." + p.id + ".name", "Planet name", p.name)}
      ${admInp("p." + p.id + ".role", "Role", p.role)}
      ${admInp("p." + p.id + ".org", "Organization", p.org)}
      ${admInp("p." + p.id + ".period", "Period", p.period)}
      ${admArea("p." + p.id + ".env", "Environment description", p.env, 2)}
      ${admArea("p." + p.id + ".bullets", "Experience bullets (one per line)", p.bullets.join("\n"))}
      ${admInp("p." + p.id + ".chips", "Chips (comma separated)", p.chips.join(", "))}
      ${admInp("p." + p.id + ".actCaption", "Bean activity caption", p.actCaption || "")}
    </div>`;
  }));
  document.getElementById("adminBody").innerHTML = html;
}
document.getElementById("navA").addEventListener("click", () => { renderAdmin(); adminEl.classList.add("show"); });
document.getElementById("admClose").addEventListener("click", () => adminEl.classList.remove("show"));
document.getElementById("admReset").addEventListener("click", () => { localStorage.removeItem("cu-admin-overrides"); location.reload(); });
document.getElementById("admSave").addEventListener("click", () => {
  const ov = { owner: {}, planets: {} };
  adminEl.querySelectorAll("[data-k]").forEach((el) => {
    const k = el.dataset.k, v = el.value;
    if (k.startsWith("owner.")) { ov.owner[k.slice(6)] = v; return; }
    const parts = k.split(".");
    const id = parts[1], field = parts[2];
    ov.planets[id] = ov.planets[id] || {};
    if (field === "bullets") ov.planets[id].bullets = v.split("\n").map((s) => s.trim()).filter(Boolean);
    else if (field === "chips") ov.planets[id].chips = v.split(",").map((s) => s.trim()).filter(Boolean);
    else ov.planets[id][field] = v;
  });
  localStorage.setItem("cu-admin-overrides", JSON.stringify(ov));
  location.reload();
});

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

</script>
